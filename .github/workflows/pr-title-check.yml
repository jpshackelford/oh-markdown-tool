name: PR Title Check

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: write
  contents: read

jobs:
  check-title:
    name: Validate PR Title
    runs-on: ubuntu-latest
    # Skip for Release Please PRs (they already follow conventional commits)
    if: |
      !startsWith(github.event.pull_request.head.ref, 'release-please--')
    steps:
      - name: Check PR title follows Conventional Commits
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Types allowed (conventional commits types)
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          # Require a scope (e.g., "fix(parser): ..." or allow without scope)
          requireScope: false
          # Subjects should start with lowercase
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            The subject "{subject}" found in the PR title "{title}"
            should start with a lowercase letter.
          # Validate all commits (not just title) if desired
          validateSingleCommit: false
          # Allow merge commits
          ignoreLabels: |
            ignore-semantic-check
          # Custom error message
          headerPattern: '^(\w+)(?:\(([^)]+)\))?!?: (.+)$'
          headerPatternCorrespondence: type, scope, subject
